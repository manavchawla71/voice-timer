<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Voice Timer</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #121212;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        text-align: center;
      }

      #timer {
        font-size: 70px;
        margin-bottom: 20px;
      }

      button {
        padding: 10px 25px;
        margin: 5px;
        font-size: 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      #start {
        background: #27ae60;
        color: white;
      }
      #reset {
        background: #e74c3c;
        color: white;
      }
      #stop {
        background: blue;
        color: white;
      }
      .status {
        margin-top: 15px;
        opacity: 0.8;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Voice Timer</h1>

      <div id="timer">00:00</div>

      <button id="start">Start</button>
      <button id="reset">Reset</button>
      <button id="stop">Stop</button>
      <div class="status">Say: "1 minute", "30 seconds", then say "start"</div>
    </div>

    <script>
      let time = 0;
      let interval = null;

      const timerDisplay = document.getElementById("timer");
      const startBtn = document.getElementById("start");
      const resetBtn = document.getElementById("reset");
      const stopBtn = document.getElementById("stop");

      function updateDisplay() {
        let mins = Math.floor(time / 60);
        let secs = time % 60;

        timerDisplay.textContent =
          String(mins).padStart(2, "0") + ":" + String(secs).padStart(2, "0");
      }

      function startTimer() {
        if (interval) return;

        interval = setInterval(() => {
          if (time <= 0) {
            clearInterval(interval);
            interval = null;
            alert("Time up!");
            return;
          }

          time--;
          updateDisplay();
        }, 1000);
      }

      function resetTimer() {
        clearInterval(interval);
        interval = null;
        time = 0;
        updateDisplay();
      }

      function stopTimer() {
        clearInterval(interval);
        interval = null;
        updateDisplay();
      }
      startBtn.onclick = startTimer;
      resetBtn.onclick = resetTimer;
      stopBtn.onclick = stopTimer;

      updateDisplay();

      /* -------------------
VOICE RECOGNITION
-------------------- */

      const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

      const numberWords = {
        zero: 0,
        one: 1,
        two: 2,
        three: 3,
        four: 4,
        five: 5,
        six: 6,
        seven: 7,
        eight: 8,
        nine: 9,
        ten: 10,
      };

      function getNumber(text) {
        let num = parseInt(text);

        if (!isNaN(num)) return num;

        for (let word in numberWords) {
          if (text.includes(word)) {
            return numberWords[word];
          }
        }

        return null;
      }

      if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.lang = "en-US";

        recognition.start();

        recognition.onresult = function (event) {
          const speech = event.results[event.results.length - 1][0].transcript
            .toLowerCase()
            .trim();

          console.log("Heard:", speech);

          let number = getNumber(speech);

          if (number !== null) {
            if (speech.includes("minute")) {
              time = number * 60;
              updateDisplay();
            }

            if (speech.includes("second")) {
              time = number;
              updateDisplay();
            }
          }

          if (speech.includes("start")) {
            startBtn.click();
          }

          if (speech.includes("reset")) {
            resetBtn.click();
          }
          if (speech.includes("stop")) {
            stopBtn.click();
          }
        };
      }
    </script>
  </body>
</html>
